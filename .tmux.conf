# tmux — Tokyo Night powerline, ergonomic defaults

# ── General ──────────────────────────────────────────────────────
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set  -g mouse on
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g history-limit 50000
set  -g escape-time 0
set  -g focus-events on
set  -g set-clipboard on

# ── Vi copy mode ─────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Splits & windows ────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# ── Pane navigation (Alt-arrow, no prefix needed) ───────────────
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-w kill-pane

# ── Pane resize (prefix + H/J/K/L, repeatable) ──────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane borders (Tokyo Night) ──────────────────────────────────
set -g pane-border-lines   simple
set -g pane-border-style        "fg=#292e42"
set -g pane-active-border-style "fg=#292e42"

# ── Message bar (Tokyo Night) ───────────────────────────────────
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g mode-style    "bg=#33467c,fg=#c0caf5"

# ── Status bar — Tokyo Night Powerline ──────────────────────────
set -g status-position bottom
set -g status-justify  left
set -g status-interval 5
set -g status-style    "bg=#16161e"

set -g status-left-length  30
set -g status-right-length 50

set -g status-left  "#[fg=#c0caf5,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,nobold]"
set -g status-right "#[fg=#292e42]#[fg=#a9b1d6,bg=#292e42] %H:%M #[fg=#7aa2f7]#[fg=#c0caf5,bg=#7aa2f7,bold] %d %b "

setw -g window-status-format         "#[fg=#16161e,bg=#292e42]#[fg=#a9b1d6,bg=#292e42] #I  #W #[fg=#292e42,bg=#16161e]"
setw -g window-status-current-format "#[fg=#16161e,bg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold] #I  #W #[fg=#7aa2f7,bg=#16161e]"
setw -g window-status-separator      ""
