# Alacritty — Tokyo Night + tmux

[general]
live_config_reload = true

[terminal.shell]
program = "/bin/zsh"
args = ["-l", "-c", "command -v tmux >/dev/null && tmux new-session -A -s main || exec zsh -l"]

# Window ---------------------------------------------------------
[window]
decorations = "Buttonless"
startup_mode = "Maximized"
padding = { x = 12, y = 4 }
dynamic_padding = true
option_as_alt = "Both"

# Font ------------------------------------------------------------
[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

# Tokyo Night color scheme ----------------------------------------
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

[colors.vi_mode_cursor]
text = "#1a1b26"
cursor = "#73daca"

[colors.selection]
text = "CellForeground"
background = "#33467c"

[colors.search.matches]
foreground = "#1a1b26"
background = "#e0af68"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

# Keybindings — macOS-native feel for tmux -----------------------
# Prefix is Ctrl-b (\x02)

# Tab / window management
[[keyboard.bindings]]
key = "T"
mods = "Command"
chars = "\u0002c"          # prefix + c  → new window

[[keyboard.bindings]]
key = "W"
mods = "Command"
chars = "\u0002&"          # prefix + &  → close window (with confirm)

# Pane splitting (iTerm2-style)
[[keyboard.bindings]]
key = "D"
mods = "Command"
chars = "\u0002|"          # prefix + |  → split side-by-side

[[keyboard.bindings]]
key = "D"
mods = "Command|Shift"
chars = "\u0002-"          # prefix + -  → split stacked

# Pane close
[[keyboard.bindings]]
key = "W"
mods = "Command|Shift"
chars = "\u0002x"          # prefix + x  → close pane (with confirm)

# Navigate windows with Cmd-1..9
[[keyboard.bindings]]
key = "Key1"
mods = "Command"
chars = "\u00021"

[[keyboard.bindings]]
key = "Key2"
mods = "Command"
chars = "\u00022"

[[keyboard.bindings]]
key = "Key3"
mods = "Command"
chars = "\u00023"

[[keyboard.bindings]]
key = "Key4"
mods = "Command"
chars = "\u00024"

[[keyboard.bindings]]
key = "Key5"
mods = "Command"
chars = "\u00025"

[[keyboard.bindings]]
key = "Key6"
mods = "Command"
chars = "\u00026"

[[keyboard.bindings]]
key = "Key7"
mods = "Command"
chars = "\u00027"

[[keyboard.bindings]]
key = "Key8"
mods = "Command"
chars = "\u00028"

[[keyboard.bindings]]
key = "Key9"
mods = "Command"
chars = "\u00029"

# Prev / Next window
[[keyboard.bindings]]
key = "LBracket"
mods = "Command|Shift"
chars = "\u0002p"          # prefix + p  → previous window

[[keyboard.bindings]]
key = "RBracket"
mods = "Command|Shift"
chars = "\u0002n"          # prefix + n  → next window

# Toggle pane zoom
[[keyboard.bindings]]
key = "Return"
mods = "Command|Shift"
chars = "\u0002z"          # prefix + z  → zoom pane

# New Alacritty window (spawns new instance → auto-attaches tmux)
[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "SpawnNewInstance"

# Clear screen
[[keyboard.bindings]]
key = "K"
mods = "Command"
action = "ClearHistory"
